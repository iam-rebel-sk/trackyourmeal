<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#1f2937"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Emerald circle background -->
  <circle cx="100" cy="100" r="90" fill="url(#grad)"/>
  
  <!-- Fork (left) -->
  <g transform="translate(-15, -10)">
    <!-- Fork handle -->
    <line x1="100" y1="140" x2="100" y2="80" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- Fork prongs -->
    <line x1="80" y1="70" x2="80" y2="40" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="70" x2="100" y2="40" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="120" y1="70" x2="120" y2="40" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Fork connector -->
    <line x1="80" y1="70" x2="120" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Spoon (right) -->
  <g transform="translate(15, 10)">
    <!-- Spoon handle -->
    <line x1="100" y1="60" x2="100" y2="120" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- Spoon bowl -->
    <ellipse cx="100" cy="45" rx="18" ry="20" fill="white" stroke="white" stroke-width="5"/>
  </g>
  
  <!-- Plate circle outline -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
</svg>